name = "vibestudio-signaling"
main = "src/index.ts"
compatibility_date = "2024-11-15"

# Deploy as its own Worker.
#
#   cd apps/signaling
#   wrangler deploy
#
# Optional secrets (Cloudflare Realtime TURN — per-session credential minting).
# If unset, the room serves the free Cloudflare STUN server only (dev / no-TURN);
# a deployment that must traverse symmetric NAT MUST set both:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_KEY_API_TOKEN
#
# TURN credential lifetime is config, not a secret — it lives in [vars] below
# (TURN_TTL_SECONDS). Defaults to 3600 (1h connection-lifetime backstop) if the
# [vars] entry is removed.
#
# account_id is environment-specific. Set CLOUDFLARE_ACCOUNT_ID in the deploy
# shell or CI environment.

[vars]
ENVIRONMENT = "production"
# Minted TURN credential lifetime (seconds). A pairing + session is minutes; 1h
# leaves slack for ICE-restart without a day-long billable credential.
TURN_TTL_SECONDS = "3600"

# Production signaling endpoint used by the app's hosted default:
#   wss://signal.vibestudio.app/
[[routes]]
pattern = "signal.vibestudio.app"
custom_domain = true

# The signaling room — one Durable Object instance per UUID room, persistent for
# the connection's lifetime (WebSocket Hibernation API) so it can carry
# ICE-restart, not just first connect.
[[durable_objects.bindings]]
name = "SIGNALING_ROOM"
class_name = "SignalingRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingRoom"]
