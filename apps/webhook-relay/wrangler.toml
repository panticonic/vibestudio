name = "vibestudio-webhook-relay"
main = "src/index.ts"
compatibility_date = "2024-11-15"

# Deploy as its own Worker.
#
#   cd apps/webhook-relay
#   wrangler deploy
#
# Required secret (backhaul auth + relay-envelope signing):
#   wrangler secret put VIBESTUDIO_RELAY_SIGNING_SECRET
#
# Universal-link host (mobile OAuth deep-link). Set as plain vars or secrets:
#   VIBESTUDIO_APPLE_APP_ID                      e.g. ABCDE12345.app.vibestudio.mobile (comma-separated for multiple)
#   VIBESTUDIO_ANDROID_PACKAGE_NAME              e.g. app.vibestudio.mobile
#   VIBESTUDIO_ANDROID_SHA256_CERT_FINGERPRINTS  uppercase colon-separated, comma-separated for multiple
#
# VIBESTUDIO_SERVER_BASE_URL is GONE — routing is multi-tenant now: each home
# server holds one authenticated backhaul WebSocket (/backhaul) into the global
# RelayRegistry DO and claims its own subscriptionIds (first-writer-wins).
#
# account_id is environment-specific. Set CLOUDFLARE_ACCOUNT_ID in the deploy
# shell or CI environment.

[vars]
ENVIRONMENT = "production"

# Single apex host for pairing, app-link verification, OAuth callbacks,
# webhook ingress, and relay backhaul:
#   https://vibestudio.app/
[[routes]]
pattern = "vibestudio.app"
custom_domain = true

# Multi-tenant registry: backhaul sockets, first-writer-wins registration,
# durable webhook buffer, ephemeral OAuth handoff map. One global instance.
[[durable_objects.bindings]]
name = "RELAY_REGISTRY"
class_name = "RelayRegistry"

[[migrations]]
tag = "v1"
new_classes = ["RelayRegistry"]
