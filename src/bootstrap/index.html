<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibestudio Launch</title>
    <link rel="icon" type="image/svg+xml" href="./assets/brand/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="./assets/brand/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/brand/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/brand/favicon-180.png" />
    <style>
      /* One token layer, two themes. The palette mirrors the shell's brand
         language (violet-to-magenta over mauve neutrals) so the launch window
         and the workspace it hands off to read as the same product. Every rule
         below styles against these variables; the light block only re-points
         the variables. */
      :root {
        --macos-titlebar-control-reserve: 78px;
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;

        --brand-gradient: linear-gradient(135deg, #7c3aed 0%, #a021d8 52%, #e0329f 100%);

        --bg: #0f0917;
        --titlebar-bg: rgb(21 13 32 / 82%);
        --titlebar-border: rgb(196 162 255 / 12%);
        --titlebar-text: #9b8cb0;

        --panel-bg: rgb(32 21 47 / 86%);
        --panel-border: rgb(196 162 255 / 15%);
        --panel-shadow: 0 30px 70px rgb(5 2 12 / 55%);
        --divider: rgb(196 162 255 / 13%);

        --surface: rgb(255 255 255 / 4%);
        --surface-strong: rgb(255 255 255 / 7%);
        --surface-border: rgb(196 162 255 / 13%);
        --surface-border-hover: rgb(196 162 255 / 30%);

        --text: #f5f0fb;
        --text-muted: #b3a5c6;
        --text-soft: #8d7fa3;
        --accent: #c9a7ff;

        /* Steps progress along the brand gradient: done reads violet, the step
           in flight reads magenta. A semantic green here looked borrowed from
           another product. */
        --step-done: #a78bfa;
        --step-active: #f24bb0;
        --danger: #ff9d9d;
        --danger-border: rgb(255 120 120 / 30%);
        --danger-surface: rgb(126 34 46 / 32%);

        --focus-ring: rgb(168 116 255 / 24%);
        --pulse-ring: rgb(242 75 176 / 26%);

        background: var(--bg);
        color: var(--text);
      }
      body {
        margin: 0;
        min-height: 100vh;
        box-sizing: border-box;
        padding: 60px 22px 30px;
        /* Flex + auto margins on the child, not place-items: center — centered
           grid/flex items clip their own top edge once they outgrow the window,
           and the approval state does exactly that on short screens. */
        display: flex;
        background:
          radial-gradient(115% 85% at 10% -12%, rgb(124 58 237 / 26%) 0%, transparent 62%),
          radial-gradient(95% 75% at 94% 4%, rgb(224 50 159 / 15%) 0%, transparent 64%),
          linear-gradient(180deg, #1a1026 0%, #0d0814 100%);
        background-attachment: fixed;
      }
      .bootstrap-titlebar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 10;
        height: 36px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        padding: 0 14px 0 var(--macos-titlebar-control-reserve);
        border-bottom: 1px solid var(--titlebar-border);
        background: var(--titlebar-bg);
        color: var(--titlebar-text);
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.01em;
        user-select: none;
        /* Draggable — but this is ONLY safe because ViewManager fully detaches
           this view (removeChildView) on handoff to the hosted shell; see
           hideBootstrapShell(). The bootstrap and hosted shell are separate
           WebContentsViews in one BaseWindow, and a hidden-but-attached view
           keeps this drag region registered on the native window, where it
           leaks onto the hosted shell's titlebar and makes its controls drag
           instead of click. If you ever stop detaching, make this no-drag. */
        app-region: drag;
        -webkit-app-region: drag;
      }
      main,
      button,
      input,
      label,
      summary {
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }
      main {
        width: min(600px, 100%);
        margin: auto;
      }
      main[data-bootstrap-mode="connection"] {
        width: min(860px, 100%);
      }

      /* One surface holds the whole launch story: identity, what is happening,
         and what you can do about it. Earlier this was a detached header plus a
         floating card, which read as two unrelated things. */
      .launch-panel {
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 28px;
        background: var(--panel-bg);
        box-shadow: var(--panel-shadow);
        backdrop-filter: blur(14px);
      }
      .launch-panel::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 2px;
        background: var(--brand-gradient);
      }
      .launch-header {
        display: grid;
        justify-items: start;
      }
      .launch-mark {
        width: 40px;
        height: 40px;
        margin-bottom: 16px;
        filter: drop-shadow(0 8px 18px rgb(124 58 237 / 40%));
      }
      .launch-mark img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .eyebrow {
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.09em;
      }
      .launch-header[data-tone="error"] .eyebrow {
        color: var(--danger);
      }
      h1 {
        font-size: 23px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 8px 0 0;
        text-wrap: balance;
      }
      p {
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.55;
        margin: 0;
      }
      #launch-copy {
        margin-top: 8px;
        max-width: 58ch;
      }
      #launch-copy[hidden] {
        display: none;
      }

      /* The body only carries what the header does not already say: progress,
         choices, and controls. Never a second copy of the status sentence. */
      .launch-body {
        display: grid;
        gap: 14px;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.55;
      }
      /* Spacing lives on the id so every body mode (steps, approvals, the
         connection grid) sits the same distance below the header. */
      #approvals:empty {
        display: none;
      }
      #approvals:not(:empty) {
        margin-top: 20px;
        border-top: 1px solid var(--divider);
        padding-top: 18px;
      }
      .connection-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .connection-option {
        border: 1px solid var(--surface-border);
        background: var(--surface);
        border-radius: 12px;
        padding: 16px;
        display: grid;
        align-content: start;
        gap: 12px;
      }
      .connection-form {
        grid-row: span 2;
      }
      .connection-error {
        grid-column: 1 / -1;
        border: 1px solid var(--danger-border);
        background: var(--danger-surface);
        color: var(--danger);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }
      .log-path {
        display: block;
        padding: 9px 11px;
        border: 1px solid var(--surface-border);
        border-radius: 8px;
        color: var(--text-soft);
        background: var(--surface);
        font-size: 11px;
        overflow-wrap: anywhere;
      }
      .field-grid {
        display: grid;
        gap: 10px;
      }
      label {
        display: grid;
        gap: 6px;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 650;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--surface-border);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 11px;
        font: inherit;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }
      .workspace-list {
        display: grid;
        gap: 8px;
      }
      .workspace-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--surface-border);
        background: var(--surface);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .workspace-name {
        color: var(--text);
        font-size: 14px;
        font-weight: 650;
        overflow-wrap: anywhere;
      }
      .inline-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }
      .approval {
        display: grid;
        gap: 14px;
      }
      .unit-summary {
        display: grid;
        gap: 10px;
        border: 1px solid var(--surface-border);
        background: var(--surface);
        border-radius: 10px;
        padding: 12px;
      }
      .unit-summary-total {
        color: var(--text);
        font-size: 14px;
        font-weight: 650;
      }
      .unit-summary-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .unit-chip {
        border: 1px solid var(--surface-border-hover);
        background: var(--surface-strong);
        color: var(--accent);
        border-radius: 999px;
        padding: 3px 9px;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
      }
      .unit-review {
        border: 1px solid var(--surface-border);
        background: var(--surface);
        border-radius: 10px;
      }
      .unit-review > summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 11px 12px;
        cursor: pointer;
        color: var(--text);
        font-size: 13px;
        font-weight: 650;
        list-style: none;
      }
      .unit-review > summary::-webkit-details-marker {
        display: none;
      }
      .unit-review[open] > summary {
        border-bottom: 1px solid var(--divider);
      }
      .unit-review-hint {
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 500;
        text-align: right;
      }
      .unit-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 10px;
        list-style: none;
      }
      .unit-list li {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--surface-border);
        background: var(--surface);
        border-radius: 8px;
        padding: 10px 12px;
      }
      .unit-name {
        color: var(--text);
        font-size: 13px;
        font-weight: 650;
      }
      .unit-meta {
        color: var(--text-soft);
        font-size: 12px;
      }
      .unit-capabilities {
        color: var(--text-soft);
        font-size: 12px;
        margin-top: 2px;
      }
      .unit-kind {
        color: var(--accent);
        font-size: 12px;
        font-weight: 650;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .title {
        color: var(--text);
        font-size: 15px;
        font-weight: 650;
      }
      .meta {
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.5;
      }
      button {
        border: 1px solid var(--surface-border);
        background: var(--surface-strong);
        color: var(--text);
        border-radius: 8px;
        padding: 9px 14px;
        font: inherit;
        font-size: 13px;
        font-weight: 650;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        min-height: 38px;
        cursor: pointer;
        transition:
          border-color var(--motion, 140ms) ease,
          background var(--motion, 140ms) ease,
          transform var(--motion, 140ms) ease;
      }
      button:hover:not(:disabled) {
        border-color: var(--surface-border-hover);
      }
      button:active:not(:disabled) {
        transform: translateY(1px);
      }
      button:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }
      button.primary {
        border-color: transparent;
        background: var(--brand-gradient);
        color: #ffffff;
        box-shadow: 0 6px 16px rgb(124 58 237 / 24%);
      }
      button.primary:hover:not(:disabled) {
        border-color: transparent;
        filter: brightness(1.07);
      }
      button.danger {
        border-color: var(--danger-border);
        background: var(--danger-surface);
        color: var(--danger);
      }
      button:disabled {
        cursor: wait;
        opacity: 0.62;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid currentcolor;
        border-right-color: transparent;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }
      .status {
        color: var(--accent);
        font-size: 13px;
        line-height: 1.5;
      }

      .launch-timeline {
        display: grid;
        gap: 2px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .launch-phase {
        position: relative;
        display: grid;
        grid-template-columns: 14px 1fr;
        gap: 12px;
        align-items: start;
        padding: 4px 0;
        color: var(--text-soft);
        font-size: 13px;
        line-height: 1.45;
      }
      /* Rail between consecutive dots, so the phases read as one sequence. */
      .launch-phase:not(:last-child)::before {
        content: "";
        position: absolute;
        top: 16px;
        bottom: -2px;
        left: 6.5px;
        width: 1px;
        background: var(--divider);
      }
      .launch-phase-dot {
        width: 7px;
        height: 7px;
        margin: 5px 3.5px;
        border-radius: 999px;
        background: var(--text-soft);
        opacity: 0.45;
      }
      .launch-phase.complete {
        color: var(--text-muted);
      }
      .launch-phase.complete .launch-phase-dot {
        background: var(--step-done);
        opacity: 1;
      }
      .launch-phase.active {
        color: var(--text);
      }
      .launch-phase.active .launch-phase-dot {
        background: var(--step-active);
        opacity: 1;
        animation: dot-pulse 1.6s ease-out infinite;
      }
      .launch-phase.blocked,
      .launch-phase.failed {
        color: var(--danger);
      }
      .launch-phase.blocked .launch-phase-dot,
      .launch-phase.failed .launch-phase-dot {
        background: var(--danger);
        opacity: 1;
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;

          --bg: #faf7ff;
          --titlebar-bg: rgb(255 255 255 / 84%);
          --titlebar-border: rgb(88 28 135 / 10%);
          --titlebar-text: #6b5b7e;

          --panel-bg: rgb(255 255 255 / 92%);
          --panel-border: rgb(124 58 237 / 14%);
          --panel-shadow: 0 26px 60px rgb(76 29 149 / 13%);
          --divider: rgb(124 58 237 / 13%);

          --surface: rgb(124 58 237 / 4%);
          --surface-strong: rgb(124 58 237 / 7%);
          --surface-border: rgb(124 58 237 / 15%);
          --surface-border-hover: rgb(124 58 237 / 32%);

          --text: #21132f;
          --text-muted: #5f5273;
          --text-soft: #7d7191;
          --accent: #7c3aed;

          --step-done: #7c3aed;
          --step-active: #d61f8f;
          --danger: #b4232d;
          --danger-border: rgb(180 35 45 / 22%);
          --danger-surface: rgb(255 241 242 / 90%);

          --focus-ring: rgb(124 58 237 / 18%);
        }
        body {
          background:
            radial-gradient(110% 80% at 8% -10%, rgb(124 58 237 / 14%) 0%, transparent 60%),
            radial-gradient(95% 70% at 95% 2%, rgb(224 50 159 / 11%) 0%, transparent 62%),
            linear-gradient(180deg, #fdfbff 0%, #f6efff 100%);
          background-attachment: fixed;
        }
        .launch-mark {
          filter: drop-shadow(0 8px 16px rgb(124 58 237 / 22%));
        }
      }

      @media (max-width: 760px) {
        body {
          place-items: start center;
          padding: 52px 16px 24px;
        }
        .bootstrap-titlebar {
          height: 34px;
        }
        main,
        main[data-bootstrap-mode="connection"] {
          width: min(100%, 600px);
        }
        .launch-panel {
          padding: 22px 20px;
        }
        .connection-grid {
          grid-template-columns: 1fr;
        }
        .connection-form {
          grid-row: auto;
        }
        .inline-form,
        .workspace-row {
          grid-template-columns: 1fr;
        }
        .workspace-row button,
        .inline-form button {
          width: 100%;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes dot-pulse {
        0% {
          box-shadow: 0 0 0 0 var(--pulse-ring);
        }
        70% {
          box-shadow: 0 0 0 6px rgb(242 75 176 / 0%);
        }
        100% {
          box-shadow: 0 0 0 0 rgb(242 75 176 / 0%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="bootstrap-titlebar">Vibestudio</div>
    <main data-bootstrap-launch-gate="true" data-bootstrap-mode="approval">
      <section class="launch-panel">
        <header class="launch-header">
          <span class="launch-mark">
            <img src="./assets/brand/vibestudio-symbol.svg" alt="" />
          </span>
          <p id="bootstrap-eyebrow" class="eyebrow">Starting</p>
          <h1 id="bootstrap-title">Starting workspace</h1>
          <p id="launch-copy">Connecting to your workspace...</p>
        </header>
        <!-- The first paint already shows the launch sequence — index.ts replaces
             these rows with live phase state, keeping the same shape. Mirrors
             startupTimeline() there; keep the labels in sync. -->
        <section id="approvals" class="launch-body">
          <ol class="launch-timeline">
            <li class="launch-phase active" aria-current="step">
              <span class="launch-phase-dot" aria-hidden="true"></span>
              <span class="launch-phase-text">Connect</span>
            </li>
            <li class="launch-phase pending">
              <span class="launch-phase-dot" aria-hidden="true"></span>
              <span class="launch-phase-text">Review trust</span>
            </li>
            <li class="launch-phase pending">
              <span class="launch-phase-dot" aria-hidden="true"></span>
              <span class="launch-phase-text">Start privileged units</span>
            </li>
            <li class="launch-phase pending">
              <span class="launch-phase-dot" aria-hidden="true"></span>
              <span class="launch-phase-text">Build desktop app</span>
            </li>
            <li class="launch-phase pending">
              <span class="launch-phase-dot" aria-hidden="true"></span>
              <span class="launch-phase-text">Activate desktop</span>
            </li>
            <li class="launch-phase pending">
              <span class="launch-phase-dot" aria-hidden="true"></span>
              <span class="launch-phase-text">Connected</span>
            </li>
          </ol>
        </section>
      </section>
    </main>
    <script type="module" src="./bootstrap/index.js"></script>
  </body>
</html>
