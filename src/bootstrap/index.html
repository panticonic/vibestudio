<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NatStack Launch</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #111315;
        color: #f5f7f8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #15191d 0%, #101214 100%);
      }
      main {
        width: min(680px, calc(100vw - 40px));
      }
      h1 {
        font-size: 28px;
        line-height: 1.12;
        font-weight: 720;
        letter-spacing: 0;
        margin: 2px 0 8px;
      }
      p {
        color: #aab3b8;
        line-height: 1.5;
        margin: 0;
      }
      .launch-header {
        display: grid;
        grid-template-columns: 44px 1fr;
        gap: 14px;
        align-items: start;
        margin-bottom: 20px;
      }
      .launch-mark {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #e7f6f2;
        color: #0f302b;
        font-weight: 800;
      }
      .eyebrow {
        color: #8fbdb4;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      .launch-card {
        border: 1px solid #31383d;
        background: #171b1f;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 16px 40px rgb(0 0 0 / 24%);
      }
      .approval {
        display: grid;
        gap: 14px;
      }
      .unit-summary {
        display: grid;
        gap: 10px;
        border: 1px solid #263136;
        background: #101518;
        border-radius: 6px;
        padding: 12px;
      }
      .unit-summary-total {
        color: #f5f7f8;
        font-weight: 700;
      }
      .unit-summary-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .unit-chip {
        border: 1px solid #27554f;
        background: #172d2a;
        color: #bcece3;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
      }
      .unit-review {
        border: 1px solid #2b3237;
        background: #12171a;
        border-radius: 6px;
      }
      .unit-review > summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 650;
        list-style: none;
      }
      .unit-review > summary::-webkit-details-marker {
        display: none;
      }
      .unit-review[open] > summary {
        border-bottom: 1px solid #2b3237;
      }
      .unit-review-hint {
        color: #8d989e;
        font-size: 12px;
        font-weight: 500;
        text-align: right;
      }
      .unit-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 10px;
        list-style: none;
      }
      .unit-list li {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        border: 1px solid #2b3237;
        background: #111518;
        border-radius: 6px;
        padding: 10px 12px;
      }
      .unit-name {
        font-weight: 650;
      }
      .unit-meta {
        color: #8d989e;
        font-size: 12px;
      }
      .unit-capabilities {
        color: #738087;
        font-size: 12px;
        margin-top: 2px;
      }
      .unit-kind {
        color: #96ccc2;
        font-size: 12px;
        font-weight: 650;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .title {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .meta {
        color: #aab3b8;
        font-size: 13px;
      }
      button {
        border: 1px solid #3d474d;
        background: #20262a;
        color: #f5f7f8;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      button.primary {
        background: #9de3d4;
        border-color: #9de3d4;
        color: #09201c;
        font-weight: 700;
      }
      button.danger {
        background: #3a1d1d;
        border-color: #6e2b2b;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid currentcolor;
        border-right-color: transparent;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }
      .status {
        color: #96ccc2;
        font-size: 13px;
      }
      .empty {
        color: #aab3b8;
      }
      .empty-message {
        color: #dbe3e6;
        line-height: 1.5;
      }
      .launch-timeline {
        display: grid;
        gap: 8px;
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
      }
      .launch-phase {
        display: grid;
        grid-template-columns: 12px 1fr;
        gap: 10px;
        align-items: start;
        color: #859198;
        font-size: 13px;
        line-height: 1.45;
      }
      .launch-phase-dot {
        width: 8px;
        height: 8px;
        margin-top: 5px;
        border-radius: 999px;
        background: #434d54;
      }
      .launch-phase.complete {
        color: #a7d7cd;
      }
      .launch-phase.complete .launch-phase-dot {
        background: #74c7b8;
      }
      .launch-phase.active {
        color: #f5f7f8;
      }
      .launch-phase.active .launch-phase-dot {
        background: #f2c46d;
      }
      .launch-phase.blocked,
      .launch-phase.failed {
        color: #ffb3b3;
      }
      .launch-phase.blocked .launch-phase-dot,
      .launch-phase.failed .launch-phase-dot {
        background: #d56b6b;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main data-bootstrap-launch-gate="true">
      <section class="launch-header">
        <div class="launch-mark">N</div>
        <div>
          <p class="eyebrow">Workspace Approval</p>
          <h1>Do you trust the code in this workspace?</h1>
          <p id="launch-copy">NatStack needs your approval before it can run this workspace.</p>
        </div>
      </section>
      <section id="approvals" class="launch-card empty">Checking workspace approval...</section>
    </main>
    <script type="module" src="./bootstrap/index.js"></script>
  </body>
</html>
