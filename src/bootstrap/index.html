<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibestudio Launch</title>
    <link rel="icon" type="image/svg+xml" href="./assets/brand/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="./assets/brand/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/brand/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/brand/favicon-180.png" />
    <style>
      :root {
        --macos-titlebar-control-reserve: 78px;
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #1f2123;
        color: #f5f7f8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        box-sizing: border-box;
        padding-top: 36px;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #26282b 0%, #1e2022 100%);
      }
      .bootstrap-titlebar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 10;
        height: 36px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        padding: 0 14px 0 var(--macos-titlebar-control-reserve);
        border-bottom: 1px solid rgb(255 255 255 / 7%);
        background: rgb(33 35 38 / 80%);
        color: #7f8a90;
        font-size: 12px;
        font-weight: 650;
        user-select: none;
        /* Draggable — but this is ONLY safe because ViewManager fully detaches
           this view (removeChildView) on handoff to the hosted shell; see
           hideBootstrapShell(). The bootstrap and hosted shell are separate
           WebContentsViews in one BaseWindow, and a hidden-but-attached view
           keeps this drag region registered on the native window, where it
           leaks onto the hosted shell's titlebar and makes its controls drag
           instead of click. If you ever stop detaching, make this no-drag. */
        app-region: drag;
        -webkit-app-region: drag;
      }
      main,
      button,
      input,
      label,
      summary {
        app-region: no-drag;
        -webkit-app-region: no-drag;
      }
      main {
        width: min(680px, calc(100vw - 40px));
      }
      main[data-bootstrap-mode="connection"] {
        width: min(860px, calc(100vw - 40px));
      }
      h1 {
        font-size: 28px;
        line-height: 1.12;
        font-weight: 720;
        letter-spacing: 0;
        margin: 2px 0 8px;
      }
      p {
        color: #aab3b8;
        line-height: 1.5;
        margin: 0;
      }
      .launch-header {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 14px;
        align-items: start;
        margin-bottom: 20px;
      }
      .launch-mark {
        width: 52px;
        height: 52px;
        filter: drop-shadow(0 10px 18px rgb(0 0 0 / 28%));
      }
      .launch-mark img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .eyebrow {
        color: #8fbdb4;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      .launch-card {
        border: 1px solid #31383d;
        background: #25272b;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 16px 40px rgb(0 0 0 / 24%);
      }
      .connection-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .connection-option {
        border: 1px solid #31383d;
        background: #25272b;
        border-radius: 8px;
        padding: 16px;
        min-height: 132px;
        display: grid;
        align-content: start;
        gap: 12px;
        box-shadow: 0 16px 40px rgb(0 0 0 / 18%);
      }
      .connection-form {
        grid-row: span 2;
      }
      .connection-error {
        grid-column: 1 / -1;
        border: 1px solid #763636;
        background: #341c1e;
        color: #ffd0d0;
        border-radius: 8px;
        padding: 10px 12px;
        line-height: 1.4;
      }
      .log-path {
        display: block;
        margin-top: 12px;
        padding: 9px 10px;
        border: 1px solid #31383d;
        border-radius: 6px;
        color: #aab3b8;
        background: #1f2124;
        font-size: 11px;
        overflow-wrap: anywhere;
      }
      .field-grid {
        display: grid;
        gap: 10px;
      }
      label {
        display: grid;
        gap: 6px;
        color: #c4cdd2;
        font-size: 12px;
        font-weight: 650;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #3a4349;
        background: #1f2124;
        color: #f5f7f8;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: #8bd8cb;
        box-shadow: 0 0 0 3px rgb(139 216 203 / 14%);
      }
      .workspace-list {
        display: grid;
        gap: 8px;
      }
      .workspace-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border: 1px solid #2b3237;
        background: #232528;
        border-radius: 6px;
        padding: 10px;
      }
      .workspace-name {
        font-weight: 700;
        overflow-wrap: anywhere;
      }
      .inline-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-top: 2px;
      }
      .approval {
        display: grid;
        gap: 14px;
      }
      .unit-summary {
        display: grid;
        gap: 10px;
        border: 1px solid #263136;
        background: #202225;
        border-radius: 6px;
        padding: 12px;
      }
      .unit-summary-total {
        color: #f5f7f8;
        font-weight: 700;
      }
      .unit-summary-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .unit-chip {
        border: 1px solid #27554f;
        background: #172d2a;
        color: #bcece3;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
      }
      .unit-review {
        border: 1px solid #2b3237;
        background: #232528;
        border-radius: 6px;
      }
      .unit-review > summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 650;
        list-style: none;
      }
      .unit-review > summary::-webkit-details-marker {
        display: none;
      }
      .unit-review[open] > summary {
        border-bottom: 1px solid #2b3237;
      }
      .unit-review-hint {
        color: #8d989e;
        font-size: 12px;
        font-weight: 500;
        text-align: right;
      }
      .unit-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 10px;
        list-style: none;
      }
      .unit-list li {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        border: 1px solid #2b3237;
        background: #212427;
        border-radius: 6px;
        padding: 10px 12px;
      }
      .unit-name {
        font-weight: 650;
      }
      .unit-meta {
        color: #8d989e;
        font-size: 12px;
      }
      .unit-capabilities {
        color: #738087;
        font-size: 12px;
        margin-top: 2px;
      }
      .unit-kind {
        color: #96ccc2;
        font-size: 12px;
        font-weight: 650;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .title {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .meta {
        color: #aab3b8;
        font-size: 13px;
      }
      button {
        border: 1px solid #474f55;
        background: #2b2e32;
        color: #f5f7f8;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        min-height: 36px;
      }
      button.primary {
        background: #9de3d4;
        border-color: #9de3d4;
        color: #09201c;
        font-weight: 700;
      }
      button.danger {
        background: #3a1d1d;
        border-color: #6e2b2b;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid currentcolor;
        border-right-color: transparent;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }
      .status {
        color: #96ccc2;
        font-size: 13px;
      }
      .empty {
        color: #aab3b8;
      }
      .empty-message {
        color: #dbe3e6;
        line-height: 1.5;
      }
      .launch-timeline {
        display: grid;
        gap: 8px;
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
      }
      .launch-phase {
        display: grid;
        grid-template-columns: 12px 1fr;
        gap: 10px;
        align-items: start;
        color: #859198;
        font-size: 13px;
        line-height: 1.45;
      }
      .launch-phase-dot {
        width: 8px;
        height: 8px;
        margin-top: 5px;
        border-radius: 999px;
        background: #434d54;
      }
      .launch-phase.complete {
        color: #a7d7cd;
      }
      .launch-phase.complete .launch-phase-dot {
        background: #74c7b8;
      }
      .launch-phase.active {
        color: #f5f7f8;
      }
      .launch-phase.active .launch-phase-dot {
        background: #f2c46d;
      }
      .launch-phase.blocked,
      .launch-phase.failed {
        color: #ffb3b3;
      }
      .launch-phase.blocked .launch-phase-dot,
      .launch-phase.failed .launch-phase-dot {
        background: #d56b6b;
      }
      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          background: #f5f7f8;
          color: #182026;
        }
        body {
          background: linear-gradient(180deg, #fbfcfc 0%, #eef2f3 100%);
        }
        .bootstrap-titlebar {
          border-bottom-color: rgb(15 35 45 / 10%);
          background: rgb(247 249 250 / 88%);
          color: #68777f;
        }
        p,
        label,
        .meta,
        .empty,
        .unit-review-hint,
        .launch-phase {
          color: #5c6b73;
        }
        .launch-card,
        .connection-option,
        .connection-form,
        .workspace-row,
        .approval,
        .unit-review {
          border-color: #d4dde1;
          background: #ffffff;
          box-shadow: 0 14px 34px rgb(31 54 65 / 9%);
        }
        input,
        button {
          border-color: #b8c5cb;
          background: #ffffff;
          color: #182026;
        }
        input:focus {
          border-color: #3e897d;
          box-shadow: 0 0 0 3px rgb(62 137 125 / 14%);
        }
        .workspace-list,
        .unit-list,
        .unit-review > summary {
          border-color: #dbe3e6;
          background: #f7f9fa;
        }
        .connection-error {
          border-color: #dbaaaa;
          background: #fff0f0;
          color: #842828;
        }
        .log-path {
          border-color: #d4dde1;
          background: #eef2f3;
          color: #46565e;
        }
        .unit-chip {
          border-color: #b9d8d2;
          background: #e9f5f2;
          color: #28675d;
        }
        .launch-phase.active {
          color: #182026;
        }
        .launch-phase.blocked,
        .launch-phase.failed {
          color: #9b3232;
        }
      }
      @media (max-width: 760px) {
        body {
          place-items: start center;
          padding: 54px 0 28px;
        }
        .bootstrap-titlebar {
          height: 34px;
          padding-left: var(--macos-titlebar-control-reserve);
        }
        main,
        main[data-bootstrap-mode="connection"] {
          width: min(100vw - 28px, 680px);
        }
        .connection-grid {
          grid-template-columns: 1fr;
        }
        .connection-form {
          grid-row: auto;
        }
        .inline-form,
        .workspace-row {
          grid-template-columns: 1fr;
        }
        .workspace-row button,
        .inline-form button {
          width: 100%;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="bootstrap-titlebar">Vibestudio</div>
    <main data-bootstrap-launch-gate="true" data-bootstrap-mode="approval">
      <section class="launch-header">
        <div class="launch-mark">
          <img src="./assets/brand/vibestudio-mark-on-dark.png" alt="" />
        </div>
        <div>
          <p id="bootstrap-eyebrow" class="eyebrow">Workspace Approval</p>
          <h1 id="bootstrap-title">Do you trust the code in this workspace?</h1>
          <p id="launch-copy">Vibestudio needs your approval before it can run this workspace.</p>
        </div>
      </section>
      <section id="approvals" class="launch-card empty">Checking workspace approval...</section>
    </main>
    <script type="module" src="./bootstrap/index.js"></script>
  </body>
</html>
