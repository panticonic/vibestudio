# Vibestudio Central Configuration Example
# Location: ~/.config/vibestudio/config.yml (or equivalent on Windows/Mac)
# This configuration is shared across all workspaces

# ============================================================================
# Model Role Configuration
# ============================================================================
# Define which models to use for different roles
# Roles can be: smart, coding, fast, cheap, or custom names
# Format: "provider:model" or detailed config object

models:
  smart: openai-codex:gpt-5.6-sol
  coding: openai-codex:gpt-5.6-sol
  fast: openai-codex:gpt-5.6-sol
  cheap: openai-codex:gpt-5.6-sol

# ============================================================================
# Build Cache Configuration
# ============================================================================
# Configure the build cache system for panel artifacts and dependencies
# All sizes are in bytes unless otherwise specified

cache:
  # Main Process Cache (Global Storage)
  maxEntries: 100000           # Maximum number of cache entries (default: 100000)
  maxSize: 5368709120          # Maximum total size in bytes (default: 5GB)

  # Cache Expiration
  # Only applies in development mode (production never expires)
  expirationMs: 300000         # Expiration time in milliseconds (default: 300000 = 5 minutes)

# ============================================================================
# Remote Pairing Configuration
# ============================================================================
# Remote reach is WebRTC. Pairing commands use the hosted signaling endpoint by
# default; override it only when self-hosting:
#
#   vibestudio remote serve --signal-url wss://vibestudio-signaling.<account>.workers.dev
#
# The signaling service only brokers the WebRTC rendezvous; workspace data moves
# over the pinned DTLS pipe, not through a public HTTP remote URL.

# ============================================================================
# Size Reference Guide
# ============================================================================
# 1 KB = 1024 bytes
# 1 MB = 1048576 bytes
# 1 GB = 1073741824 bytes
#
# Default maxSize (5GB) = 5368709120 bytes
# Default maxSizePerPanel (2GB) = 2147483648 bytes
#
# Examples:
# 10 GB = 10737418240
# 1 GB  = 1073741824
# 500 MB = 524288000
# 100 MB = 104857600
