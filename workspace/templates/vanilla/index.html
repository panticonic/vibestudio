<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      #root {
        min-height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const showBootError = (value) => {
          const root = document.getElementById("root");
          if (!root || root.childElementCount > 0) return;
          const message = value instanceof Error ? value.message : String(value || "Unknown error");
          root.innerHTML =
            '<main style="font:14px system-ui;padding:24px;max-width:720px;margin:auto">' +
            "<h1>Panel failed to start</h1><p></p>" +
            '<button type="button" onclick="location.reload()">Reload panel</button></main>';
          root.querySelector("p").textContent = message;
        };
        window.addEventListener(
          "error",
          (event) => showBootError(event.error || event.message || "A panel asset failed to load."),
          true
        );
        window.addEventListener("unhandledrejection", (event) => showBootError(event.reason));
      })();
    </script>
    <script src="bundle.js"></script>
  </body>
</html>
